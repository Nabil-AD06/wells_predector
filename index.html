<!DOCTYPE html>
<html>
<head>
    <title>Water Detection AI</title>
</head>
<body>

<h2>Click on map to detect water</h2>

<div id="map" style="height:500px;width:100%"></div>

<script>
function initMap() {
    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 6,
        center: { lat: 31.5, lng: -7.8 }
    });

    map.addListener("click", function(event) {
        const lat = event.latLng.lat();
        const lon = event.latLng.lng();

        console.log("Clicked:", lat, lon); // DEBUG

        fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({lat, lon})
        })
        .then(res => res.json())
        .then(data => {
            alert("🌊 Probability: " + data.probability);
        })
        .catch(err => {
            console.error(err);
            alert("Error calling API");
        });
    });
}
</script>

<!-- IMPORTANT -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDpSQ08hQwW3FmunAIV7vGFbIIv58fHSII&callback=initMap">
</script>

</body>
</html>
